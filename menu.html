<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Settings</title>
    <!-- Premium Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Include Phosphor Icons, GSAP & Supabase -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              appBg: "#0b0e11",
              surface: "#1e2329",
              surfaceHover: "#2b3139",
              brand: "#0047FF",
              textMain: "#F5F5F5",
              textMuted: "#848E9C",
              danger: "#F6465D",
              warning: "#F5B700",
              success: "#23C55E",
            },
          },
        },
      };
    </script>
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }
      body {
        background-color: #0b0e11;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .gpu-accel {
        will-change: transform, opacity;
      }

      /* Animated Gradient Background for Header */
      @keyframes gradient-shift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      .bg-animated {
        background: linear-gradient(-45deg, #0b0e11, #001f66, #0047ff, #0b0e11);
        background-size: 300% 300%;
        animation: gradient-shift 12s ease infinite;
      }

      /* Hide elements initially for GSAP */
      #toast {
        display: none;
      }
    </style>
  </head>
  <body
    class="text-textMain font-sans m-0 p-0 antialiased flex justify-center items-start min-h-[100dvh] bg-appBg"
  >
    <!-- App Container -->
    <div
      class="max-w-[450px] mx-auto w-full h-[100dvh] bg-appBg relative flex flex-col overflow-hidden shadow-2xl border-x border-gray-900/50"
    >
      <!-- ========================================== -->
      <!-- SETTINGS SCREEN                            -->
      <!-- ========================================== -->
      <div
        class="flex-1 flex flex-col h-full overflow-y-auto no-scrollbar relative z-10"
      >
        <!-- Header -->
        <div
          class="bg-animated pt-2 pb-6 rounded-b-[32px] shadow-[0_12px_40px_-10px_rgba(0,71,255,0.2)] relative z-20 shrink-0"
        >
          <header
            class="flex justify-between items-center px-6 mb-2 relative"
            style="padding-top: max(1rem, env(safe-area-inset-top))"
          >
            <!-- Back Button -->
            <button
              onclick="history.back()"
              class="w-11 h-11 rounded-[18px] bg-[#1e2329]/90 border border-white/10 flex items-center justify-center text-white active:scale-90 transition-all duration-200 backdrop-blur-xl"
            >
              <i class="ph ph-caret-left text-[22px]"></i>
            </button>
            <h1 class="text-[17px] font-bold tracking-wide drop-shadow-sm">
              Settings
            </h1>
            <!-- Dummy invisible button to perfectly center the title -->
            <div class="w-11 h-11"></div>
          </header>
        </div>

        <!-- Content Area -->
        <div class="px-5 pt-6 pb-10 flex flex-col gap-6 relative">
          <!-- User Profile Card -->
          <div
            class="bg-surface border border-white/5 rounded-[20px] p-5 flex items-center justify-between shadow-lg"
          >
            <div class="flex items-center gap-4">
              <div
                class="w-14 h-14 rounded-full bg-brand/20 border border-brand/40 flex items-center justify-center"
              >
                <i class="ph-fill ph-user text-[24px] text-brand"></i>
              </div>
              <div>
                <h2
                  id="profile-name"
                  class="text-[17px] font-bold text-white leading-tight"
                >
                  Loading...
                </h2>
                <p id="profile-email" class="text-[13px] text-textMuted mt-0.5">
                  Please wait
                </p>
              </div>
            </div>
            <button
              class="toast-trigger bg-[#2b3139] px-4 py-2 rounded-[12px] text-[13px] font-semibold text-white active:scale-95 transition-all"
            >
              Edit
            </button>
          </div>

          <!-- Section 1: Account -->
          <div class="flex flex-col gap-2">
            <h3
              class="text-[12px] font-bold text-textMuted/80 ml-2 mb-1 uppercase tracking-wider"
            >
              Account
            </h3>

            <div
              class="toast-trigger w-full bg-surface border border-white/5 rounded-[16px] p-4 flex items-center justify-between cursor-pointer transition-all duration-200"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-9 h-9 rounded-[12px] bg-brand/10 flex items-center justify-center border border-brand/20"
                >
                  <i
                    class="ph-fill ph-identification-card text-brand text-[20px]"
                  ></i>
                </div>
                <span class="text-[15px] font-medium text-white"
                  >Personal Details</span
                >
              </div>
              <i class="ph ph-caret-right text-textMuted text-[18px]"></i>
            </div>

            <div
              class="toast-trigger w-full bg-surface border border-white/5 rounded-[16px] p-4 flex items-center justify-between cursor-pointer transition-all duration-200"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-9 h-9 rounded-[12px] bg-[#9D4EDD]/10 flex items-center justify-center border border-[#9D4EDD]/20"
                >
                  <i
                    class="ph-fill ph-file-text text-[#9D4EDD] text-[20px]"
                  ></i>
                </div>
                <span class="text-[15px] font-medium text-white"
                  >Statements & Taxes</span
                >
              </div>
              <i class="ph ph-caret-right text-textMuted text-[18px]"></i>
            </div>
          </div>

          <!-- Section 2: Security -->
          <div class="flex flex-col gap-2">
            <h3
              class="text-[12px] font-bold text-textMuted/80 ml-2 mb-1 uppercase tracking-wider"
            >
              Security
            </h3>

            <div
              class="toast-trigger w-full bg-surface border border-white/5 rounded-[16px] p-4 flex items-center justify-between cursor-pointer transition-all duration-200"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-9 h-9 rounded-[12px] bg-success/10 flex items-center justify-center border border-success/20"
                >
                  <i
                    class="ph-fill ph-shield-check text-success text-[20px]"
                  ></i>
                </div>
                <span class="text-[15px] font-medium text-white"
                  >Security & Limits</span
                >
              </div>
              <i class="ph ph-caret-right text-textMuted text-[18px]"></i>
            </div>

            <div
              class="toast-trigger w-full bg-surface border border-white/5 rounded-[16px] p-4 flex items-center justify-between cursor-pointer transition-all duration-200"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-9 h-9 rounded-[12px] bg-[#0D9488]/10 flex items-center justify-center border border-[#0D9488]/20"
                >
                  <i
                    class="ph-fill ph-device-mobile text-[#0D9488] text-[20px]"
                  ></i>
                </div>
                <span class="text-[15px] font-medium text-white"
                  >Two-Factor Auth (2FA)</span
                >
              </div>
              <i class="ph ph-caret-right text-textMuted text-[18px]"></i>
            </div>
          </div>

          <!-- Section 3: Preferences -->
          <div class="flex flex-col gap-2">
            <h3
              class="text-[12px] font-bold text-textMuted/80 ml-2 mb-1 uppercase tracking-wider"
            >
              Preferences
            </h3>

            <!-- Push Notifications (Toggle) -->
            <div
              class="w-full bg-surface border border-white/5 rounded-[16px] p-4 flex items-center justify-between cursor-pointer"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-9 h-9 rounded-[12px] bg-warning/10 flex items-center justify-center border border-warning/20"
                >
                  <i class="ph-fill ph-bell text-warning text-[20px]"></i>
                </div>
                <span class="text-[15px] font-medium text-white"
                  >Push Notifications</span
                >
              </div>
              <button
                class="toggle-btn w-12 h-7 rounded-full bg-brand relative transition-colors duration-300"
              >
                <div
                  class="toggle-dot w-[20px] h-[20px] bg-white rounded-full absolute top-[4px] left-[4px] shadow-sm transition-transform duration-300 translate-x-[20px]"
                ></div>
              </button>
            </div>

            <!-- Dark Mode (Toggle) -->
            <div
              class="w-full bg-surface border border-white/5 rounded-[16px] p-4 flex items-center justify-between cursor-pointer"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-9 h-9 rounded-[12px] bg-[#6366F1]/10 flex items-center justify-center border border-[#6366F1]/20"
                >
                  <i class="ph-fill ph-moon text-[#6366F1] text-[20px]"></i>
                </div>
                <span class="text-[15px] font-medium text-white"
                  >Dark Mode</span
                >
              </div>
              <button
                class="toggle-btn w-12 h-7 rounded-full bg-brand relative transition-colors duration-300"
              >
                <div
                  class="toggle-dot w-[20px] h-[20px] bg-white rounded-full absolute top-[4px] left-[4px] shadow-sm transition-transform duration-300 translate-x-[20px]"
                ></div>
              </button>
            </div>

            <!-- Language -->
            <div
              class="toast-trigger w-full bg-surface border border-white/5 rounded-[16px] p-4 flex items-center justify-between cursor-pointer transition-all duration-200"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-9 h-9 rounded-[12px] bg-[#EC4899]/10 flex items-center justify-center border border-[#EC4899]/20"
                >
                  <i class="ph-fill ph-globe text-[#EC4899] text-[20px]"></i>
                </div>
                <span class="text-[15px] font-medium text-white">Language</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-[13px] text-textMuted">English</span>
                <i class="ph ph-caret-right text-textMuted text-[18px]"></i>
              </div>
            </div>
          </div>

          <!-- Section 4: Actions -->
          <div class="flex flex-col gap-2 mt-2">
            <div
              class="toast-trigger w-full bg-surface border border-white/5 rounded-[16px] p-4 flex items-center justify-center cursor-pointer transition-all duration-200"
            >
              <div class="flex items-center gap-2 text-danger">
                <i class="ph-bold ph-sign-out text-[20px]"></i>
                <span class="text-[15px] font-bold">Log Out</span>
              </div>
            </div>
            <p class="text-center text-[12px] text-textMuted/50 mt-2">
              App Version 2.4.1 (Build 412)
            </p>
          </div>
        </div>
      </div>
      <!-- End of scrollable container -->

      <!-- Custom Toast Notification -->
      <div
        id="toast"
        class="absolute top-10 left-1/2 -translate-x-1/2 bg-[#1e2329] border border-brand/30 shadow-[0_10px_30px_rgba(0,71,255,0.2)] rounded-full px-5 py-3 flex items-center gap-2 z-50"
      >
        <i class="ph-fill ph-wrench text-brand text-[18px]"></i>
        <span class="text-[13px] font-semibold text-white"
          >Feature in development!</span
        >
      </div>
    </div>

    <!-- Application Logic -->
    <script>
      // --- Supabase Setup ---
      const BROKER_URL = "https://odhxccqsrvkfwvpjjmof.supabase.co";
      const BROKER_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kaHhjY3FzcnZrZnd2cGpqbW9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDk5NzAsImV4cCI6MjA4NzkyNTk3MH0.rjyZ-GLvt2o-nwOWeUFWkdbzUG4ZXZOilYw8PHKovs8";
      const supabaseClient = window.supabase.createClient(
        BROKER_URL,
        BROKER_KEY,
      );

      document.addEventListener("DOMContentLoaded", () => {
        // Fetch and display user name and email
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          const nameEl = document.getElementById("profile-name");
          const emailEl = document.getElementById("profile-email");

          if (session && session.user) {
            nameEl.innerText =
              session.user.user_metadata?.full_name || "User Account";
            emailEl.innerText = session.user.email || "";
          } else {
            nameEl.innerText = "Guest User";
            emailEl.innerText = "Not logged in";
          }
        });

        // UI Interactions (Toasts & Toggles)
        const toastTriggers = document.querySelectorAll(".toast-trigger");
        const toggles = document.querySelectorAll(".toggle-btn");
        const toast = document.getElementById("toast");
        let toastTimeout;

        // "Coming soon" toast animation for list items
        toastTriggers.forEach((item) => {
          item.addEventListener("click", () => {
            // Haptic Shake Animation
            gsap.to(item, {
              x: [-4, 4, -4, 4, 0],
              duration: 0.3,
              ease: "power2.inOut",
            });

            // Highlight border briefly
            gsap.fromTo(
              item,
              { borderColor: "#F5B700" },
              {
                borderColor: "rgba(255,255,255,0.05)",
                duration: 0.6,
                delay: 0.2,
              },
            );

            // Show Toast
            clearTimeout(toastTimeout);
            toast.style.display = "flex";

            gsap.fromTo(
              toast,
              { y: -20, opacity: 0, scale: 0.9 },
              {
                y: 0,
                opacity: 1,
                scale: 1,
                duration: 0.3,
                ease: "back.out(1.5)",
              },
            );

            toastTimeout = setTimeout(() => {
              gsap.to(toast, {
                y: -20,
                opacity: 0,
                scale: 0.9,
                duration: 0.3,
                ease: "power2.in",
                onComplete: () => (toast.style.display = "none"),
              });
            }, 2000);
          });
        });

        // Interactive Toggles logic
        toggles.forEach((btn) => {
          // Allow parent row click to trigger toggle as well
          const parentRow = btn.closest(".w-full");
          if (parentRow) {
            parentRow.addEventListener("click", (e) => {
              // trigger the button click
              btn.click();
            });
          }

          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const dot = btn.querySelector(".toggle-dot");
            const isActive = btn.classList.contains("bg-brand");

            if (isActive) {
              btn.classList.remove("bg-brand");
              btn.classList.add("bg-surfaceHover");
              dot.classList.remove("translate-x-[20px]");
            } else {
              btn.classList.remove("bg-surfaceHover");
              btn.classList.add("bg-brand");
              dot.classList.add("translate-x-[20px]");
            }
          });
        });
      });
    </script>
  </body>
</html>
