<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Insurance Company - Authentication</title>
    <!-- Premium Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Include Phosphor Icons & GSAP -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              appBg: "#0b0e11",
              surface: "#1e2329",
              surfaceHover: "#2b3139",
              inputBg: "#14181d",
              brand: "#0047FF",
              textMain: "#F5F5F5",
              textMuted: "#848E9C",
              danger: "#F6465D",
              success: "#23C55E",
            },
          },
        },
      };
    </script>
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }
      body {
        background-color: #0b0e11;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Animated Gradient Header */
      @keyframes gradient-shift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      .bg-animated {
        background: linear-gradient(-45deg, #0b0e11, #0047ff, #001f66, #0b0e11);
        background-size: 300% 300%;
        animation: gradient-shift 12s ease infinite;
      }

      /* Checkbox styling */
      input[type="checkbox"] {
        appearance: none;
        background-color: transparent;
        margin: 0;
        font: inherit;
        color: currentColor;
        width: 1.15em;
        height: 1.15em;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 0.25em;
        display: grid;
        place-content: center;
        transition: all 0.2s ease-in-out;
        cursor: pointer;
      }
      input[type="checkbox"]::before {
        content: "";
        width: 0.65em;
        height: 0.65em;
        transform: scale(0);
        transition: 120ms transform ease-in-out;
        box-shadow: inset 1em 1em white;
        background-color: transform;
        transform-origin: center;
        clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
      }
      input[type="checkbox"]:checked {
        background-color: var(--brand);
        border-color: var(--brand);
      }
      input[type="checkbox"]:checked::before {
        transform: scale(1);
      }

      /* THE FIX: Added !important to prevent Tailwind's flex class from overriding this */
      .hidden-form {
        display: none !important;
      }
    </style>
  </head>
  <body
    class="text-textMain font-sans m-0 p-0 antialiased flex justify-center items-start min-h-[100dvh]"
  >
    <!-- App Container -->
    <div
      class="max-w-[450px] mx-auto w-full h-[100dvh] bg-appBg relative flex flex-col overflow-hidden shadow-2xl border-x border-gray-900/50"
    >
      <!-- Custom Toast Notification -->
      <div
        id="toast"
        class="absolute top-10 left-1/2 -translate-x-1/2 bg-surface border border-white/10 shadow-[0_10px_30px_rgba(0,0,0,0.5)] rounded-full px-5 py-3 flex items-center gap-2 z-50 opacity-0 pointer-events-none transform -translate-y-4 transition-colors duration-300"
      >
        <i id="toast-icon" class="ph-fill ph-info text-[18px]"></i>
        <span
          id="toast-msg"
          class="text-[13px] font-semibold text-white whitespace-nowrap"
          >Message goes here</span
        >
      </div>

      <main class="flex-1 overflow-y-auto no-scrollbar pb-10 relative">
        <!-- Header Section with Animated Gradient -->
        <div
          class="bg-animated pt-12 pb-24 rounded-b-[40px] relative shadow-[0_12px_40px_-10px_rgba(0,71,255,0.2)] z-10"
        >
          <div
            class="text-center px-6 relative z-10 flex flex-col items-center"
          >
            <div
              class="w-16 h-16 bg-[#14181d] border border-brand/40 rounded-[20px] flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(0,71,255,0.4)] relative"
            >
              <i class="ph-fill ph-shield-check text-[32px] text-brand"></i>
            </div>
            <h1
              id="headerTitle"
              class="text-[28px] font-extrabold tracking-tight text-white mb-1 drop-shadow-md"
            >
              Welcome Back
            </h1>
            <p
              id="headerSubtitle"
              class="text-[14px] text-white/80 font-medium drop-shadow-sm"
            >
              Securely login to your account
            </p>
          </div>
        </div>

        <!-- Forms Container -->
        <div class="px-5 -mt-16 relative z-20">
          <div
            class="bg-surface/95 backdrop-blur-xl rounded-[32px] p-6 shadow-[0_16px_40px_-15px_rgba(0,0,0,0.6)] border border-white/10"
          >
            <!-- ============================ -->
            <!-- LOGIN FORM                   -->
            <!-- ============================ -->
            <form id="login-form" class="flex flex-col gap-4">
              <!-- Email -->
              <div>
                <label
                  class="text-[13px] font-semibold text-textMuted ml-1 mb-1.5 block"
                  >Email Address</label
                >
                <div class="relative flex items-center">
                  <i
                    class="ph ph-envelope-simple absolute left-4 text-[20px] text-textMuted transition-colors peer-focus:text-brand"
                  ></i>
                  <input
                    type="email"
                    id="login-email"
                    required
                    class="peer w-full bg-inputBg border border-white/5 rounded-[16px] py-4 pl-12 pr-4 text-white text-[15px] font-medium focus:outline-none focus:border-brand/50 focus:bg-[#1a1f26] transition-all placeholder:text-textMuted/50 shadow-inner"
                    placeholder="name@example.com"
                  />
                </div>
              </div>

              <!-- Password -->
              <div>
                <label
                  class="text-[13px] font-semibold text-textMuted ml-1 mb-1.5 block"
                  >Password</label
                >
                <div class="relative flex items-center">
                  <i
                    class="ph ph-lock-key absolute left-4 text-[20px] text-textMuted transition-colors peer-focus:text-brand"
                  ></i>
                  <input
                    type="password"
                    id="login-password"
                    required
                    class="peer w-full bg-inputBg border border-white/5 rounded-[16px] py-4 pl-12 pr-12 text-white text-[15px] font-medium focus:outline-none focus:border-brand/50 focus:bg-[#1a1f26] transition-all placeholder:text-textMuted/50 shadow-inner"
                    placeholder="••••••••"
                  />
                  <button
                    type="button"
                    onclick="toggleVisibility('login-password', this)"
                    class="absolute right-2 w-10 h-10 flex items-center justify-center text-textMuted hover:text-white transition-colors"
                  >
                    <i class="ph ph-eye-slash text-[20px]"></i>
                  </button>
                </div>
              </div>

              <!-- Extras -->
              <div class="flex justify-between items-center px-1 mt-1 mb-2">
                <label class="flex items-center gap-2 cursor-pointer group">
                  <input type="checkbox" id="remember-me" />
                  <span
                    class="text-[13px] font-medium text-textMuted group-hover:text-white/80 transition-colors"
                    >Remember me</span
                  >
                </label>
                <a
                  href="#"
                  class="text-[13px] font-semibold text-brand hover:text-brand/80 transition-colors"
                  >Forgot Password?</a
                >
              </div>

              <!-- Submit -->
              <button
                type="submit"
                id="login-btn"
                class="w-full bg-brand hover:bg-brand/90 text-white font-bold text-[16px] py-4 rounded-[16px] shadow-[0_8px_20px_-6px_rgba(0,71,255,0.4)] active:scale-[0.98] transition-all flex justify-center items-center gap-2 mt-2"
              >
                <span class="btn-text">Log In</span>
                <i
                  class="ph ph-spinner-gap animate-spin hidden loader text-[20px]"
                ></i>
              </button>

              <div class="text-center mt-4">
                <span class="text-[14px] text-textMuted font-medium"
                  >Don't have an account?
                </span>
                <button
                  type="button"
                  onclick="switchMode('register')"
                  class="text-[14px] font-bold text-white hover:text-brand transition-colors"
                >
                  Sign Up
                </button>
              </div>
            </form>

            <!-- ============================ -->
            <!-- SIGN UP FORM                 -->
            <!-- ============================ -->
            <form id="register-form" class="hidden-form flex flex-col gap-4">
              <!-- Full Name -->
              <div>
                <label
                  class="text-[13px] font-semibold text-textMuted ml-1 mb-1.5 block"
                  >Full Name</label
                >
                <div class="relative flex items-center">
                  <i
                    class="ph ph-user absolute left-4 text-[20px] text-textMuted transition-colors peer-focus:text-brand"
                  ></i>
                  <input
                    type="text"
                    id="reg-name"
                    required
                    class="peer w-full bg-inputBg border border-white/5 rounded-[16px] py-4 pl-12 pr-4 text-white text-[15px] font-medium focus:outline-none focus:border-brand/50 focus:bg-[#1a1f26] transition-all placeholder:text-textMuted/50 shadow-inner"
                    placeholder="James Smith"
                  />
                </div>
              </div>

              <!-- Email -->
              <div>
                <label
                  class="text-[13px] font-semibold text-textMuted ml-1 mb-1.5 block"
                  >Email Address</label
                >
                <div class="relative flex items-center">
                  <i
                    class="ph ph-envelope-simple absolute left-4 text-[20px] text-textMuted transition-colors peer-focus:text-brand"
                  ></i>
                  <input
                    type="email"
                    id="reg-email"
                    required
                    class="peer w-full bg-inputBg border border-white/5 rounded-[16px] py-4 pl-12 pr-4 text-white text-[15px] font-medium focus:outline-none focus:border-brand/50 focus:bg-[#1a1f26] transition-all placeholder:text-textMuted/50 shadow-inner"
                    placeholder="name@example.com"
                  />
                </div>
              </div>

              <!-- Password -->
              <div>
                <label
                  class="text-[13px] font-semibold text-textMuted ml-1 mb-1.5 block"
                  >Create Password</label
                >
                <div class="relative flex items-center">
                  <i
                    class="ph ph-lock-key absolute left-4 text-[20px] text-textMuted transition-colors peer-focus:text-brand"
                  ></i>
                  <input
                    type="password"
                    id="reg-password"
                    required
                    class="peer w-full bg-inputBg border border-white/5 rounded-[16px] py-4 pl-12 pr-12 text-white text-[15px] font-medium focus:outline-none focus:border-brand/50 focus:bg-[#1a1f26] transition-all placeholder:text-textMuted/50 shadow-inner"
                    placeholder="••••••••"
                  />
                  <button
                    type="button"
                    onclick="toggleVisibility('reg-password', this)"
                    class="absolute right-2 w-10 h-10 flex items-center justify-center text-textMuted hover:text-white transition-colors"
                  >
                    <i class="ph ph-eye-slash text-[20px]"></i>
                  </button>
                </div>
              </div>

              <!-- Submit -->
              <button
                type="submit"
                id="reg-btn"
                class="w-full bg-brand hover:bg-brand/90 text-white font-bold text-[16px] py-4 rounded-[16px] shadow-[0_8px_20px_-6px_rgba(0,71,255,0.4)] active:scale-[0.98] transition-all flex justify-center items-center gap-2 mt-4"
              >
                <span class="btn-text">Create Account</span>
                <i
                  class="ph ph-spinner-gap animate-spin hidden loader text-[20px]"
                ></i>
              </button>

              <div class="text-center mt-4">
                <span class="text-[14px] text-textMuted font-medium"
                  >Already have an account?
                </span>
                <button
                  type="button"
                  onclick="switchMode('login')"
                  class="text-[14px] font-bold text-white hover:text-brand transition-colors"
                >
                  Log In
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <!-- Application Logic (Auth & GSAP) -->
    <script>
      // --- 1. Supabase Initialization ---
      const BROKER_URL = "https://odhxccqsrvkfwvpjjmof.supabase.co";
      const BROKER_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kaHhjY3FzcnZrZnd2cGpqbW9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDk5NzAsImV4cCI6MjA4NzkyNTk3MH0.rjyZ-GLvt2o-nwOWeUFWkdbzUG4ZXZOilYw8PHKovs8";

      const supabaseClient = window.supabase.createClient(
        BROKER_URL,
        BROKER_KEY,
      );

      // Startup execution
      document.addEventListener("DOMContentLoaded", () => {
        checkRememberMe();
      });

      // --- 2. UI Interactions (GSAP & Forms) ---

      let toastTimeout;
      function showToast(message, type = "success") {
        const toast = document.getElementById("toast");
        const toastMsg = document.getElementById("toast-msg");
        const toastIcon = document.getElementById("toast-icon");

        // Configure styling based on type
        if (type === "error") {
          toast.style.borderColor = "rgba(246, 70, 93, 0.3)"; // danger color
          toastIcon.className =
            "ph-fill ph-warning-circle text-[18px] text-danger";
        } else {
          toast.style.borderColor = "rgba(35, 197, 94, 0.3)"; // success color
          toastIcon.className =
            "ph-fill ph-check-circle text-[18px] text-success";
        }

        toastMsg.innerText = message;
        clearTimeout(toastTimeout);

        // Animate In
        gsap.killTweensOf(toast);
        gsap.to(toast, {
          y: 0,
          opacity: 1,
          pointerEvents: "auto",
          duration: 0.4,
          ease: "back.out(1.5)",
        });

        // Auto Hide
        toastTimeout = setTimeout(() => {
          gsap.to(toast, {
            y: -15,
            opacity: 0,
            pointerEvents: "none",
            duration: 0.3,
            ease: "power2.in",
          });
        }, 4000);
      }

      function switchMode(target) {
        const loginForm = document.getElementById("login-form");
        const regForm = document.getElementById("register-form");
        const title = document.getElementById("headerTitle");
        const subtitle = document.getElementById("headerSubtitle");

        // Ensure toast is hidden on switch
        gsap.to(document.getElementById("toast"), {
          opacity: 0,
          duration: 0.2,
        });

        const hideForm = target === "register" ? loginForm : regForm;
        const showForm = target === "register" ? regForm : loginForm;

        // Fade out current
        gsap.to(hideForm, {
          opacity: 0,
          y: 10,
          duration: 0.2,
          onComplete: () => {
            hideForm.classList.add("hidden-form");
            showForm.classList.remove("hidden-form");

            // Update Text
            title.innerText =
              target === "register" ? "Create Account" : "Welcome Back";
            subtitle.innerText =
              target === "register"
                ? "Join us and start securely"
                : "Securely login to your account";

            // Fade in new
            gsap.fromTo(
              showForm,
              { opacity: 0, y: -10 },
              { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
            );
          },
        });
      }

      function toggleVisibility(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector("i");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("ph-eye-slash", "ph-eye");
          icon.classList.add("text-brand"); // Highlight when visible
        } else {
          input.type = "password";
          icon.classList.replace("ph-eye", "ph-eye-slash");
          icon.classList.remove("text-brand");
        }
      }

      function setLoadingState(btnId, isLoading) {
        const btn = document.getElementById(btnId);
        const text = btn.querySelector(".btn-text");
        const loader = btn.querySelector(".loader");

        if (isLoading) {
          btn.disabled = true;
          btn.classList.add("opacity-80");
          text.style.display = "none";
          loader.classList.remove("hidden");
        } else {
          btn.disabled = false;
          btn.classList.remove("opacity-80");
          text.style.display = "block";
          loader.classList.add("hidden");
        }
      }

      // --- 3. Local Storage Logic ---
      function checkRememberMe() {
        const savedEmail = localStorage.getItem("insuranceApp_email");
        if (savedEmail) {
          document.getElementById("login-email").value = savedEmail;
          document.getElementById("remember-me").checked = true;
        }
      }

      function handleRememberMe(email) {
        if (document.getElementById("remember-me").checked) {
          localStorage.setItem("insuranceApp_email", email);
        } else {
          localStorage.removeItem("insuranceApp_email");
        }
      }

      // Validation
      const isValidEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      const isValidPassword = (password) =>
        /^(?=.*[A-Z])(?=.*\d).{8,}$/.test(password);

      // --- 4. Database Auth Submissions ---

      // Handle LOGIN
      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("login-email").value.trim();
          const password = document.getElementById("login-password").value;

          if (!isValidEmail(email))
            return showToast("Please enter a valid email.", "error");
          if (!password) return showToast("Password is required.", "error");

          try {
            setLoadingState("login-btn", true);

            const { data, error } =
              await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
              });

            if (error) throw error;

            handleRememberMe(email);
            showToast("Login successful. Redirecting...", "success");

            setTimeout(() => {
              window.location.href = "dashboard.html"; // Redirection
            }, 1200);
          } catch (err) {
            setLoadingState("login-btn", false);
            showToast(
              err.message === "Invalid login credentials"
                ? "Invalid email or password."
                : err.message,
              "error",
            );
          }
        });

      // Handle SIGN UP
      document
        .getElementById("register-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const name = document.getElementById("reg-name").value.trim();
          const email = document.getElementById("reg-email").value.trim();
          const password = document.getElementById("reg-password").value;

          if (name.length < 2)
            return showToast("Please enter your full name.", "error");
          if (!isValidEmail(email))
            return showToast("Please enter a valid email.", "error");
          if (!isValidPassword(password)) {
            return showToast(
              "Password: 8+ chars, 1 uppercase, 1 number.",
              "error",
            );
          }

          try {
            setLoadingState("reg-btn", true);

            const { data, error } = await supabaseClient.auth.signUp({
              email: email,
              password: password,
              options: { data: { full_name: name } },
            });

            if (error) throw error;

            // Supabase duplicate email check bypass filter
            if (data?.user?.identities?.length === 0) {
              throw new Error(
                "This email is already registered. Please log in.",
              );
            }

            showToast("Account created successfully!", "success");

            setTimeout(() => {
              window.location.href = "dashboard.html"; // Redirection
            }, 1200);
          } catch (err) {
            setLoadingState("reg-btn", false);
            showToast(err.message, "error");
          }
        });
    </script>
  </body>
</html>
